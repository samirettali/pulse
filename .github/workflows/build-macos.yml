name: Build macOS App

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned app
        run: ./scripts/build-release.sh

      - name: Upload Pulse app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Pulse.app
          path: build/export/Pulse.app

      - name: Upload Pulse zipped release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-macOS-unsigned
          path: build/Pulse-macOS-unsigned.zip
